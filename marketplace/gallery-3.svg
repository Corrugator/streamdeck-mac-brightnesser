<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 960" width="1920" height="960">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1f"/>
      <stop offset="100%" stop-color="#06060a"/>
    </linearGradient>
    <radialGradient id="ambient" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0%" stop-color="#ffd54a" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#ffd54a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="pi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#33333a"/>
      <stop offset="100%" stop-color="#1f1f24"/>
    </linearGradient>
    <linearGradient id="lcdBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0c"/>
      <stop offset="100%" stop-color="#050507"/>
    </linearGradient>
    <linearGradient id="sdBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4d4d8"/>
      <stop offset="100%" stop-color="#90909a"/>
    </linearGradient>
    <linearGradient id="sdNeck" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b8b8c0"/>
      <stop offset="100%" stop-color="#7a7a82"/>
    </linearGradient>
    <linearGradient id="sdBase" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c4c4ca"/>
      <stop offset="100%" stop-color="#7c7c84"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1d"/>
      <stop offset="100%" stop-color="#0a0a0c"/>
    </linearGradient>
    <radialGradient id="redGlow" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0%" stop-color="#ff3b30" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ff3b30" stop-opacity="0"/>
    </radialGradient>

    <!-- Mini brand icon gradients -->
    <linearGradient id="iconBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a2e"/>
      <stop offset="100%" stop-color="#0f0f12"/>
    </linearGradient>
    <linearGradient id="iconLid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d8d8dc"/>
      <stop offset="100%" stop-color="#9c9ca2"/>
    </linearGradient>
    <linearGradient id="iconDeck" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8c8ce"/>
      <stop offset="100%" stop-color="#8c8c92"/>
    </linearGradient>
    <linearGradient id="iconDeckFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8c8c92"/>
      <stop offset="100%" stop-color="#5e5e64"/>
    </linearGradient>
    <linearGradient id="iconScreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1d"/>
      <stop offset="100%" stop-color="#0a0a0c"/>
    </linearGradient>
    <radialGradient id="sunGradient" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fff8d6"/>
      <stop offset="55%" stop-color="#ffd54a"/>
      <stop offset="100%" stop-color="#ffa726"/>
    </radialGradient>
    <radialGradient id="sunGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ffd54a" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffd54a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1920" height="960" fill="url(#bg)"/>
  <rect width="1920" height="960" fill="url(#ambient)"/>

  <!-- Brand mark top-left -->
  <g transform="translate(70 60) scale(0.16)">
    <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="url(#iconBg)"/>
    <rect x="84" y="104" width="344" height="234" rx="16" ry="16" fill="url(#iconLid)"/>
    <rect x="100" y="120" width="312" height="202" rx="6" ry="6" fill="url(#iconScreen)"/>
    <rect x="246" y="120" width="20" height="7" rx="3" ry="3" fill="#050507"/>
    <circle cx="256" cy="222" r="118" fill="url(#sunGlow)"/>
    <g fill="url(#sunGradient)">
      <g transform="translate(256 222)">
        <g transform="rotate(0)"><rect x="-7" y="-100" width="14" height="34" rx="7" ry="7"/></g>
        <g transform="rotate(45)"><rect x="-7" y="-100" width="14" height="34" rx="7" ry="7"/></g>
        <g transform="rotate(90)"><rect x="-7" y="-100" width="14" height="34" rx="7" ry="7"/></g>
        <g transform="rotate(135)"><rect x="-7" y="-100" width="14" height="34" rx="7" ry="7"/></g>
        <g transform="rotate(180)"><rect x="-7" y="-100" width="14" height="34" rx="7" ry="7"/></g>
        <g transform="rotate(225)"><rect x="-7" y="-100" width="14" height="34" rx="7" ry="7"/></g>
        <g transform="rotate(270)"><rect x="-7" y="-100" width="14" height="34" rx="7" ry="7"/></g>
        <g transform="rotate(315)"><rect x="-7" y="-100" width="14" height="34" rx="7" ry="7"/></g>
      </g>
    </g>
    <circle cx="256" cy="222" r="44" fill="url(#sunGradient)"/>
    <rect x="68" y="340" width="376" height="6" rx="2" ry="2" fill="#0a0a0c" opacity="0.7"/>
    <path d="M 60 346 L 452 346 L 484 402 L 28 402 Z" fill="url(#iconDeck)"/>
    <rect x="216" y="362" width="80" height="10" rx="3" ry="3" fill="#0a0a0c" opacity="0.18"/>
    <path d="M 28 402 L 484 402 L 476 416 L 36 416 Z" fill="url(#iconDeckFront)"/>
  </g>
  <text x="170" y="115" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-size="22" font-weight="700" fill="#ffffff" letter-spacing="0.5">Brightness Control</text>
  <text x="170" y="140" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-size="14" font-weight="500" fill="#8e8e98" letter-spacing="0.5">for Stream Deck+</text>

  <!-- Title block -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" text-anchor="middle">
    <text x="960" y="230" font-size="58" font-weight="700" fill="#ffffff">Make it yours</text>
    <text x="960" y="280" font-size="24" font-weight="500" fill="#9090a0">Custom names per display, one-click identification, and per-dial text colors.</text>
  </g>

  <!-- ============================================ -->
  <!-- LEFT: Property Inspector window              -->
  <!-- ============================================ -->
  <g transform="translate(120 320)">
    <!-- Window frame -->
    <rect x="0" y="0" width="690" height="600" rx="14" ry="14" fill="url(#pi)" stroke="#444450" stroke-width="2"/>
    <!-- Title bar -->
    <rect x="0" y="0" width="690" height="38" rx="14" ry="14" fill="#28282d"/>
    <rect x="0" y="20" width="690" height="18" fill="#28282d"/>
    <circle cx="20" cy="19" r="6" fill="#ff5f57"/>
    <circle cx="40" cy="19" r="6" fill="#febc2e"/>
    <circle cx="60" cy="19" r="6" fill="#28c840"/>
    <text x="345" y="25" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
          font-size="13" font-weight="500" fill="#9090a0" text-anchor="middle">Brightness Settings</text>

    <!-- ===== DISPLAY NAMES section ===== -->
    <text x="30" y="78" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
          font-size="12" font-weight="700" fill="#7e7e88" letter-spacing="1.2">DISPLAY NAMES</text>
    <line x1="30" y1="88" x2="660" y2="88" stroke="#3a3a40" stroke-width="1"/>

    <!-- Row 1: MacBook Display -->
    <g transform="translate(30 100)">
      <text x="0" y="20" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
            font-size="14" font-weight="500" fill="#9a9aa2">MacBook Display <tspan fill="#666" font-style="italic">— DisplayServices</tspan></text>
      <!-- Identify button -->
      <rect x="530" y="2" width="100" height="26" rx="4" ry="4" fill="transparent" stroke="#555" stroke-width="1"/>
      <text x="580" y="20" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
            font-size="13" font-weight="500" fill="#bbbbc0" text-anchor="middle">Identify</text>
      <!-- Input -->
      <rect x="0" y="38" width="630" height="32" rx="4" ry="4" fill="#1f1f1f" stroke="#444" stroke-width="1"/>
      <text x="12" y="59" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
            font-size="14" font-weight="500" fill="#eeeeef">Built-in</text>
    </g>

    <!-- Row 2: Studio Display — HIGHLIGHTED (Identify pressed) -->
    <g transform="translate(30 196)">
      <text x="0" y="20" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
            font-size="14" font-weight="500" fill="#9a9aa2">Studio Display <tspan fill="#666" font-style="italic">— DisplayServices</tspan></text>
      <!-- Identify button — pressed / active -->
      <rect x="530" y="2" width="100" height="26" rx="4" ry="4" fill="#3a2a18" stroke="#ffd54a" stroke-width="1.5"/>
      <text x="580" y="20" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
            font-size="13" font-weight="700" fill="#ffd54a" text-anchor="middle">Identify</text>
      <!-- Input with custom name "Right" -->
      <rect x="0" y="38" width="630" height="32" rx="4" ry="4" fill="#1f1f1f" stroke="#ffd54a" stroke-width="1.5"/>
      <text x="12" y="59" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
            font-size="14" font-weight="600" fill="#ffffff">Right</text>
    </g>

    <!-- Row 3: Studio Display 2 -->
    <g transform="translate(30 292)">
      <text x="0" y="20" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
            font-size="14" font-weight="500" fill="#9a9aa2">Studio Display 2 <tspan fill="#666" font-style="italic">— DisplayServices</tspan></text>
      <!-- Identify button -->
      <rect x="530" y="2" width="100" height="26" rx="4" ry="4" fill="transparent" stroke="#555" stroke-width="1"/>
      <text x="580" y="20" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
            font-size="13" font-weight="500" fill="#bbbbc0" text-anchor="middle">Identify</text>
      <!-- Input -->
      <rect x="0" y="38" width="630" height="32" rx="4" ry="4" fill="#1f1f1f" stroke="#444" stroke-width="1"/>
      <text x="12" y="59" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
            font-size="14" font-weight="500" fill="#eeeeef">Left</text>
    </g>

    <!-- ===== COLORS section ===== -->
    <text x="30" y="416" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
          font-size="12" font-weight="700" fill="#7e7e88" letter-spacing="1.2">COLORS</text>
    <line x1="30" y1="426" x2="660" y2="426" stroke="#3a3a40" stroke-width="1"/>

    <!-- Row: Monitor Name (amber) -->
    <g transform="translate(30 448)">
      <text x="0" y="20" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
            font-size="14" font-weight="500" fill="#9a9aa2">Monitor Name</text>
      <text x="480" y="20" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
            font-size="13" font-weight="500" fill="#7a7a82" text-anchor="end">#FFD54A</text>
      <rect x="555" y="0" width="75" height="26" rx="4" ry="4" fill="#ffd54a" stroke="#5a5a62" stroke-width="1"/>
    </g>

    <!-- Row: Brightness Value (white) -->
    <g transform="translate(30 488)">
      <text x="0" y="20" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
            font-size="14" font-weight="500" fill="#9a9aa2">Brightness Value</text>
      <text x="480" y="20" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
            font-size="13" font-weight="500" fill="#7a7a82" text-anchor="end">#FFFFFF</text>
      <rect x="555" y="0" width="75" height="26" rx="4" ry="4" fill="#ffffff" stroke="#5a5a62" stroke-width="1"/>
    </g>

    <!-- Row: Hint Text (blue) -->
    <g transform="translate(30 528)">
      <text x="0" y="20" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
            font-size="14" font-weight="500" fill="#9a9aa2">Hint Text</text>
      <text x="480" y="20" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
            font-size="13" font-weight="500" fill="#7a7a82" text-anchor="end">#7EB9FF</text>
      <rect x="555" y="0" width="75" height="26" rx="4" ry="4" fill="#7eb9ff" stroke="#5a5a62" stroke-width="1"/>
    </g>
  </g>

  <!-- ============================================ -->
  <!-- RIGHT TOP: Studio Display with red flash    -->
  <!-- ============================================ -->
  <g transform="translate(890 330)">
    <!-- Red glow halo -->
    <rect x="-30" y="-30" width="500" height="320" fill="url(#redGlow)"/>

    <!-- Monitor body -->
    <rect x="60" y="0" width="380" height="240" rx="18" ry="18" fill="url(#sdBody)"/>
    <rect x="70" y="10" width="360" height="220" rx="10" ry="10" fill="url(#screen)"/>
    <circle cx="250" cy="20" r="3" fill="#0a0a0c"/>

    <!-- Red highlight outline -->
    <rect x="57" y="-3" width="386" height="246" rx="20" ry="20"
          fill="none" stroke="#ff3b30" stroke-width="5"/>

    <!-- Stand neck -->
    <rect x="240" y="240" width="20" height="40" fill="url(#sdNeck)"/>
    <!-- Base -->
    <rect x="170" y="280" width="160" height="14" rx="7" ry="7" fill="url(#sdBase)"/>

    <!-- Label -->
    <text x="250" y="340" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
          font-size="20" font-weight="700" fill="#ff5c52" text-anchor="middle">Studio Display</text>
    <text x="250" y="364" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
          font-size="14" font-weight="500" fill="#c89898" text-anchor="middle">flashes when Identify is clicked</text>
  </g>

  <!-- Arrow from Identify button (around x=750 y=425) to monitor (around x=950 y=460) -->
  <g stroke="#ffd54a" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 745 425 C 820 425, 870 450, 940 460"/>
    <polygon points="940,460 928,453 932,467" fill="#ffd54a"/>
  </g>

  <!-- ============================================ -->
  <!-- RIGHT BOTTOM: LCD strip with custom names   -->
  <!-- ============================================ -->
  <g transform="translate(850 720)">
    <text x="0" y="-12" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
          font-size="14" font-weight="700" fill="#7e7e88" letter-spacing="1.2">LCD STRIP — your custom names applied</text>

    <!-- Strip background -->
    <rect x="0" y="0" width="950" height="160" rx="14" ry="14" fill="url(#lcdBg)" stroke="#3a3a40" stroke-width="2"/>

    <!-- Cell 1: Built-in (default white) -->
    <g text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif">
      <text x="118" y="38" font-size="16" font-weight="600" fill="#ffffff">Built-in</text>
      <text x="118" y="76" font-size="22" font-weight="700" fill="#ffffffcc">72%</text>
      <rect x="42" y="92" width="152" height="10" rx="2" ry="2" fill="#222226"/>
      <rect x="42" y="92" width="110" height="10" rx="2" ry="2" fill="#ffd54a"/>
      <text x="118" y="128" font-size="13" font-weight="600" fill="#7eb9ff">Press to switch 1/4</text>
    </g>
    <!-- Divider -->
    <line x1="237" y1="20" x2="237" y2="140" stroke="#1a1a1c" stroke-width="1"/>

    <!-- Cell 2: Right (amber name) ACTIVE -->
    <g text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif">
      <text x="356" y="38" font-size="16" font-weight="700" fill="#ffd54a">Right</text>
      <text x="356" y="76" font-size="22" font-weight="700" fill="#ffffff">88%</text>
      <rect x="280" y="92" width="152" height="10" rx="2" ry="2" fill="#222226"/>
      <rect x="280" y="92" width="134" height="10" rx="2" ry="2" fill="#ffd54a"/>
      <text x="356" y="128" font-size="13" font-weight="600" fill="#7eb9ff">Press to switch 2/4</text>
    </g>
    <line x1="475" y1="20" x2="475" y2="140" stroke="#1a1a1c" stroke-width="1"/>

    <!-- Cell 3: Left -->
    <g text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif">
      <text x="594" y="38" font-size="16" font-weight="600" fill="#ffd54a">Left</text>
      <text x="594" y="76" font-size="22" font-weight="700" fill="#ffffff">55%</text>
      <rect x="518" y="92" width="152" height="10" rx="2" ry="2" fill="#222226"/>
      <rect x="518" y="92" width="84" height="10" rx="2" ry="2" fill="#ffd54a"/>
      <text x="594" y="128" font-size="13" font-weight="600" fill="#7eb9ff">Press to switch 3/4</text>
    </g>
    <line x1="713" y1="20" x2="713" y2="140" stroke="#1a1a1c" stroke-width="1"/>

    <!-- Cell 4: Desk -->
    <g text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif">
      <text x="832" y="38" font-size="16" font-weight="600" fill="#ffd54a">Desk</text>
      <text x="832" y="76" font-size="22" font-weight="700" fill="#ffffff">40%</text>
      <rect x="756" y="92" width="152" height="10" rx="2" ry="2" fill="#222226"/>
      <rect x="756" y="92" width="61" height="10" rx="2" ry="2" fill="#ffd54a"/>
      <text x="832" y="128" font-size="13" font-weight="600" fill="#7eb9ff">Press to switch 4/4</text>
    </g>
  </g>
</svg>
