<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 960" width="1920" height="960">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1f"/>
      <stop offset="100%" stop-color="#06060a"/>
    </linearGradient>
    <radialGradient id="ambient" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0%" stop-color="#ffd54a" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ffd54a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="strip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0c"/>
      <stop offset="100%" stop-color="#050507"/>
    </linearGradient>
    <linearGradient id="bezel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d2d32"/>
      <stop offset="100%" stop-color="#16161a"/>
    </linearGradient>

    <!-- Mini brand icon gradients -->
    <linearGradient id="iconBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a2e"/>
      <stop offset="100%" stop-color="#0f0f12"/>
    </linearGradient>
    <linearGradient id="iconLid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d8d8dc"/>
      <stop offset="100%" stop-color="#9c9ca2"/>
    </linearGradient>
    <linearGradient id="iconDeck" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8c8ce"/>
      <stop offset="100%" stop-color="#8c8c92"/>
    </linearGradient>
    <linearGradient id="iconDeckFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8c8c92"/>
      <stop offset="100%" stop-color="#5e5e64"/>
    </linearGradient>
    <linearGradient id="iconScreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1d"/>
      <stop offset="100%" stop-color="#0a0a0c"/>
    </linearGradient>
    <radialGradient id="sunGradient" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fff8d6"/>
      <stop offset="55%" stop-color="#ffd54a"/>
      <stop offset="100%" stop-color="#ffa726"/>
    </radialGradient>
    <radialGradient id="sunGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ffd54a" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffd54a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1920" height="960" fill="url(#bg)"/>
  <rect width="1920" height="960" fill="url(#ambient)"/>

  <!-- Brand mark top-left -->
  <g transform="translate(70 60) scale(0.16)">
    <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="url(#iconBg)"/>
    <rect x="84" y="104" width="344" height="234" rx="16" ry="16" fill="url(#iconLid)"/>
    <rect x="100" y="120" width="312" height="202" rx="6" ry="6" fill="url(#iconScreen)"/>
    <rect x="246" y="120" width="20" height="7" rx="3" ry="3" fill="#050507"/>
    <circle cx="256" cy="222" r="118" fill="url(#sunGlow)"/>
    <g fill="url(#sunGradient)">
      <g transform="translate(256 222)">
        <g transform="rotate(0)"><rect x="-7" y="-100" width="14" height="34" rx="7" ry="7"/></g>
        <g transform="rotate(45)"><rect x="-7" y="-100" width="14" height="34" rx="7" ry="7"/></g>
        <g transform="rotate(90)"><rect x="-7" y="-100" width="14" height="34" rx="7" ry="7"/></g>
        <g transform="rotate(135)"><rect x="-7" y="-100" width="14" height="34" rx="7" ry="7"/></g>
        <g transform="rotate(180)"><rect x="-7" y="-100" width="14" height="34" rx="7" ry="7"/></g>
        <g transform="rotate(225)"><rect x="-7" y="-100" width="14" height="34" rx="7" ry="7"/></g>
        <g transform="rotate(270)"><rect x="-7" y="-100" width="14" height="34" rx="7" ry="7"/></g>
        <g transform="rotate(315)"><rect x="-7" y="-100" width="14" height="34" rx="7" ry="7"/></g>
      </g>
    </g>
    <circle cx="256" cy="222" r="44" fill="url(#sunGradient)"/>
    <rect x="68" y="340" width="376" height="6" rx="2" ry="2" fill="#0a0a0c" opacity="0.7"/>
    <path d="M 60 346 L 452 346 L 484 402 L 28 402 Z" fill="url(#iconDeck)"/>
    <rect x="216" y="362" width="80" height="10" rx="3" ry="3" fill="#0a0a0c" opacity="0.18"/>
    <path d="M 28 402 L 484 402 L 476 416 L 36 416 Z" fill="url(#iconDeckFront)"/>
  </g>

  <!-- Brand wordmark -->
  <text x="170" y="115" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-size="22" font-weight="700" fill="#ffffff" letter-spacing="0.5">Brightness Control</text>
  <text x="170" y="140" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-size="14" font-weight="500" fill="#8e8e98" letter-spacing="0.5">for Stream Deck+</text>

  <!-- Headline -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" text-anchor="middle">
    <text x="960" y="240" font-size="62" font-weight="700" fill="#ffffff">Live brightness on the LCD strip</text>
    <text x="960" y="295" font-size="26" font-weight="500" fill="#9090a0">Monitor name, current percentage, level bar, and switch hint — all four dials at once.</text>
  </g>

  <!-- Stream Deck+ LCD strip bezel -->
  <g transform="translate(220 430)">
    <rect x="0" y="0" width="1480" height="320" rx="32" ry="32" fill="url(#bezel)" stroke="#2a2a30" stroke-width="2"/>
    <rect x="30" y="40" width="1420" height="200" rx="14" ry="14" fill="url(#strip)"/>

    <!-- Dial circles below strip -->
    <g>
      <circle cx="207"  cy="280" r="24" fill="#0e0e10" stroke="#2a2a30" stroke-width="2"/>
      <circle cx="562"  cy="280" r="26" fill="#0e0e10" stroke="#ffd54a" stroke-width="3"/>
      <line x1="562" y1="280" x2="562" y2="259" stroke="#ffd54a" stroke-width="3" stroke-linecap="round"/>
      <circle cx="917"  cy="280" r="24" fill="#0e0e10" stroke="#2a2a30" stroke-width="2"/>
      <circle cx="1272" cy="280" r="24" fill="#0e0e10" stroke="#2a2a30" stroke-width="2"/>
    </g>

    <g font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" text-anchor="middle">
      <!-- Cell 1: MacBook Display -->
      <text x="207" y="90" font-size="22" font-weight="600" fill="#ffffff">MacBook Display</text>
      <text x="207" y="135" font-size="28" font-weight="700" fill="#ffffffcc">72%</text>
      <rect x="100" y="155" width="214" height="14" rx="3" ry="3" fill="#222226"/>
      <rect x="100" y="155" width="154" height="14" rx="3" ry="3" fill="#ffd54a"/>
      <text x="207" y="205" font-size="20" font-weight="600" fill="#ffffff">Press to switch 1/3</text>

      <!-- Cell 2: Studio Display — active -->
      <text x="562" y="90" font-size="22" font-weight="700" fill="#ffd54a">Studio Display</text>
      <text x="562" y="135" font-size="28" font-weight="700" fill="#ffffff">88%</text>
      <rect x="455" y="155" width="214" height="14" rx="3" ry="3" fill="#222226"/>
      <rect x="455" y="155" width="188" height="14" rx="3" ry="3" fill="#ffd54a"/>
      <text x="562" y="205" font-size="20" font-weight="600" fill="#ffffff">Press to switch 2/3</text>

      <!-- Cell 3: Studio Display 2 -->
      <text x="917" y="90" font-size="22" font-weight="600" fill="#ffffff">Studio Display 2</text>
      <text x="917" y="135" font-size="28" font-weight="700" fill="#ffffffcc">55%</text>
      <rect x="810" y="155" width="214" height="14" rx="3" ry="3" fill="#222226"/>
      <rect x="810" y="155" width="118" height="14" rx="3" ry="3" fill="#ffd54a"/>
      <text x="917" y="205" font-size="20" font-weight="600" fill="#ffffff">Press to switch 3/3</text>

      <!-- Cell 4: DDC monitor (3rd party) -->
      <text x="1272" y="90" font-size="22" font-weight="600" fill="#ffffff">LG UltraFine</text>
      <text x="1272" y="135" font-size="28" font-weight="700" fill="#ffffffcc">40%</text>
      <rect x="1165" y="155" width="214" height="14" rx="3" ry="3" fill="#222226"/>
      <rect x="1165" y="155" width="86"  height="14" rx="3" ry="3" fill="#ffd54a"/>
      <text x="1272" y="205" font-size="18" font-weight="500" fill="#a0a0aa">via m1ddc (DDC/CI)</text>
    </g>
  </g>

  <!-- Caption -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" text-anchor="middle">
    <text x="960" y="850" font-size="24" font-weight="500" fill="#7e7e88">The active monitor lights up in amber. Apple displays via DisplayServices, third-party panels via m1ddc — handled automatically.</text>
  </g>
</svg>
